<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가화만사성(家和萬事成) - 우리 가족 디지털 아카이브</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
</head>

<body>
    <!-- Password Protection Overlay -->
    <div id="login-overlay" class="login-overlay">
        <div class="glass login-box">
            <h2>가족 인증</h2>
            <p>우리 가족만의 소중한 공간입니다.<br>비밀번호를 입력해주세요.</p>
            <input type="password" id="family-password" placeholder="비밀번호 입력">
            <button onclick="checkPassword()">입장하기</button>
            <p id="login-error" style="color: #e63946; margin-top: 10px; display: none;">비밀번호가 올바르지 않습니다.</p>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" style="display: none;">
        <header class="glass">
            <div class="logo">가화만사성</div>
            <nav>
                <ul>
                    <li><a href="#home">홈</a></li>
                    <li><a href="#news">우리집 소식</a></li>
                    <li><a href="#album">가족 앨범</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <section id="home" class="hero-container">
                <div class="hero-image-box"></div>
                <div class="hero-text-box">
                    <p>우리들의 추억 아카이브</p>
                    <a href="#news" class="btn-primary">최신 소식 보기</a>
                </div>
            </section>

            <section id="news" class="container">
                <div class="section-title">
                    <h2>우리집 소식</h2>
                    <div class="underline"></div>
                    <button class="btn-secondary" onclick="openModal()" style="margin-top: 20px;">글쓰기</button>
                </div>
                <div class="grid" id="feed-container"></div>
            </section>

            <section id="album" class="container">
                <div class="section-title">
                    <h2>가족 앨범</h2>
                    <div class="underline"></div>
                    <button class="btn-secondary" onclick="openAlbumModal()" style="margin-top: 20px;">사진 올리기</button>
                </div>
                <div class="grid gallery" id="album-container"></div>
            </section>
        </main>

        <!-- Status Indicator -->
        <div id="status-bar" style="position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.7); color: white; font-size: 10px; padding: 5px; text-align: center; z-index: 9999;">
            서버 상태: <span id="conn-status">연결 확인 중...</span>
        </div>
    </div>

    <!-- Album Modal -->
    <div id="album-modal" class="modal-overlay" style="display: none;">
        <div class="glass modal-box">
            <h2>사진 올리기</h2>
            <div class="input-group">
                <input type="file" id="album-file" accept="image/*" style="display:none;">
                <div id="paste-area" style="border: 2px dashed #ddd; padding: 40px; text-align: center; cursor: pointer;">
                    여기를 터치하여 사진 선택
                </div>
                <div id="preview-container" style="display: none; margin-top: 15px; text-align: center;">
                    <img id="image-preview" style="max-width: 100%; border-radius: 10px;">
                </div>
            </div>
            <div class="modal-buttons">
                <button onclick="closeAlbumModal()" class="btn-cancel">취소</button>
                <button onclick="submitAlbum()" class="btn-primary">추가하기</button>
            </div>
        </div>
    </div>

    <!-- Write News Modal -->
    <div id="post-modal" class="modal-overlay" style="display: none;">
        <div class="glass modal-box">
            <h2>소식 전하기</h2>
            <div class="input-group">
                <input type="text" id="post-title" placeholder="제목">
                <input type="text" id="post-author" placeholder="작성자">
                <textarea id="post-content" placeholder="내용"></textarea>
                <input type="text" id="post-image" placeholder="이미지 주소(선택)">
            </div>
            <div class="modal-buttons">
                <button onclick="closeModal()" class="btn-cancel">취소</button>
                <button onclick="submitPost()" class="btn-primary">올리기</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Firebase 설정 (원래 알려주신 정확한 값으로 복원)
        var firebaseConfig = {
            apiKey: "AIzaSyBMU-Xl9O-alLLpayUHUvUgNlSBWR8",
            authDomain: "family-archive-eb4b2.firebaseapp.com",
            projectId: "family-archive-eb4b2",
            storageBucket: "family-archive-eb4b2.firebasestorage.app",
            messagingSenderId: "313936285468",
            appId: "1:313936285468:web:0e5f99ebf2796e6f2be227"
        };

        firebase.initializeApp(firebaseConfig);
        var db = firebase.firestore();

        var compressedImageData = null;

        function checkPassword() {
            if (document.getElementById('family-password').value === "1234") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                initializeRealtimeUpdates();
            } else { alert("비밀번호가 틀렸습니다."); }
        }

        function openModal() { document.getElementById('post-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('post-modal').style.display = 'none'; }
        function openAlbumModal() { document.getElementById('album-modal').style.display = 'flex'; }
        function closeAlbumModal() { document.getElementById('album-modal').style.display = 'none'; resetAlbumPreview(); }

        document.addEventListener('DOMContentLoaded', function() {
            var f = document.getElementById('album-file');
            var p = document.getElementById('paste-area');
            if (p && f) { p.onclick = function() { f.click(); }; }
            if (f) {
                f.onchange = function(e) {
                    var file = e.target.files[0];
                    if (!file) return;
                    p.innerText = "처리 중...";
                    var reader = new FileReader();
                    reader.onload = function(ev) {
                        var img = new Image();
                        img.onload = function() {
                            var canvas = document.createElement('canvas');
                            var MAX = 800;
                            var w = img.width, h = img.height;
                            if (w > MAX) { h *= MAX / w; w = MAX; }
                            canvas.width = w; canvas.height = h;
                            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                            compressedImageData = canvas.toDataURL('image/jpeg', 0.6);
                            document.getElementById('image-preview').src = compressedImageData;
                            document.getElementById('preview-container').style.display = 'block';
                            p.innerText = "준비 완료!";
                        };
                        img.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                };
            }
        });

        function resetAlbumPreview() {
            compressedImageData = null;
            document.getElementById('image-preview').src = '';
            document.getElementById('preview-container').style.display = 'none';
            document.getElementById('paste-area').innerText = "터치하여 사진 선택";
        }

        function submitAlbum() {
            if (!compressedImageData) { alert("사진을 골라주세요."); return; }
            closeAlbumModal();
            db.collection("familyAlbum").add({
                imageUrl: compressedImageData,
                createdAt: new Date().getTime()
            }).then(function() {
                alert("전송 성공!");
            }).catch(function(e) { 
                alert("전송 실패: " + e.message);
            });
        }

        function submitPost() {
            var t = document.getElementById('post-title').value;
            var a = document.getElementById('post-author').value;
            var c = document.getElementById('post-content').value;
            if (!t || !a || !c) return;
            db.collection("familyPosts").add({
                title: t, author: a, content: c,
                date: new Date().toISOString().split('T')[0],
                createdAt: new Date().getTime()
            }).then(closeModal);
        }

        function initializeRealtimeUpdates() {
            // 서버 연결 확인
            db.collection("familyAlbum").limit(1).onSnapshot(function() {
                document.getElementById('conn-status').innerText = "연결됨 (정상)";
                document.getElementById('conn-status').style.color = "#4caf50";
            }, function(err) {
                document.getElementById('conn-status').innerText = "연결 오류: " + err.message;
                document.getElementById('conn-status').style.color = "#ff5252";
            });

            db.collection("familyPosts").onSnapshot(function(qs) {
                var c = document.getElementById('feed-container'); c.innerHTML = '';
                qs.forEach(function(doc) {
                    var item = doc.data();
                    var d = document.createElement('div'); d.className = 'glass card';
                    d.innerHTML = '<div class="card-content"><h3>'+item.title+'</h3><p>'+item.content+'</p></div>';
                    c.appendChild(d);
                });
            });
            db.collection("familyAlbum").onSnapshot(function(qs) {
                var c = document.getElementById('album-container'); c.innerHTML = '';
                qs.forEach(function(doc) {
                    var item = doc.data();
                    var d = document.createElement('div'); d.className = 'glass card';
                    d.innerHTML = '<img src="'+item.imageUrl+'" style="width:100%; border-radius:10px;">';
                    c.appendChild(d);
                });
            });
        }
    </script>
</body>

</html>
