<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가화만사성(家和萬事成) - 우리 가족 디지털 아카이브</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
</head>

<body>
    <!-- Password Protection Overlay -->
    <div id="login-overlay" class="login-overlay">
        <div class="glass login-box">
            <h2>가족 인증</h2>
            <p>우리 가족만의 소중한 공간입니다.<br>비밀번호를 입력해주세요.</p>
            <input type="password" id="family-password" placeholder="비밀번호 입력">
            <button onclick="checkPassword()">입장하기</button>
            <p id="login-error" style="color: #e63946; margin-top: 10px; display: none;">비밀번호가 올바르지 않습니다.</p>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" style="display: none;">
        <header class="glass">
            <div class="logo">가화만사성</div>
            <nav>
                <ul>
                    <li><a href="#home">홈</a></li>
                    <li><a href="#news">우리집 소식</a></li>
                    <li><a href="#album">가족 앨범</a></li>
                    <li><a href="#videos">영상</a></li>
                    <li><a href="#events">일정</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <section id="home" class="hero-container">
                <div class="hero-image-box"></div>
                <div class="hero-text-box">
                    <p>우리들의 추억 아카이브</p>
                    <a href="#news" class="btn-primary">최신 소식 보기</a>
                </div>
            </section>

            <section id="news" class="container">
                <div class="section-title">
                    <h2>우리집 소식</h2>
                    <div class="underline"></div>
                    <button class="btn-secondary" onclick="openModal()" style="margin-top: 20px;">글쓰기</button>
                </div>
                <div class="grid" id="feed-container"></div>
            </section>

            <section id="album" class="container">
                <div class="section-title">
                    <h2>가족 앨범</h2>
                    <div class="underline"></div>
                    <button class="btn-secondary" onclick="openAlbumModal()" style="margin-top: 20px;">사진 올리기</button>
                </div>
                <div class="grid gallery" id="album-container"></div>
            </section>

            <section id="videos" class="container">
                <div class="section-title">
                    <h2>가족 영상</h2>
                    <div class="underline"></div>
                    <button class="btn-secondary" onclick="openVideoModal()" style="margin-top: 20px;">영상 추가</button>
                </div>
                <div class="grid" id="video-container"></div>
            </section>

            <section id="events" class="container">
                <div class="section-title">
                    <h2>가족 일정</h2>
                    <div class="underline"></div>
                    <button class="btn-secondary" onclick="openEventModal()" style="margin-top: 20px;">일정 추가</button>
                </div>
                <div class="calendar-widget" id="events-container"></div>
            </section>
        </main>

        <div id="status-bar" style="position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.85); color: white; font-size: 11px; padding: 10px; text-align: center; z-index: 9999;">
            상태: <span id="conn-status">준비 중...</span>
        </div>
    </div>

    <!-- Album Modal -->
    <div id="album-modal" class="modal-overlay" style="display: none;">
        <div class="glass modal-box">
            <h2>사진 올리기</h2>
            <div class="input-group">
                <input type="file" id="album-file" accept="image/*" style="display:none;">
                <div id="paste-area" onclick="document.getElementById('album-file').click()" style="border: 2px dashed #ddd; padding: 40px; text-align: center; cursor: pointer; border-radius: 10px;">
                    여기를 터치하여 사진 선택
                </div>
                <div id="preview-container" style="display: none; margin-top: 15px; text-align: center;">
                    <img id="image-preview" style="max-width: 100%; border-radius: 10px;">
                </div>
            </div>
            <div class="modal-buttons">
                <button onclick="closeAlbumModal()" class="btn-cancel">취소</button>
                <button onclick="submitAlbum()" class="btn-primary">추가하기</button>
            </div>
        </div>
    </div>

    <!-- Write News Modal -->
    <div id="post-modal" class="modal-overlay" style="display: none;">
        <div class="glass modal-box">
            <h2>소식 전하기</h2>
            <div class="input-group">
                <input type="text" id="post-title" placeholder="제목">
                <input type="text" id="post-author" placeholder="작성자">
                <textarea id="post-content" placeholder="내용"></textarea>
                <input type="hidden" id="post-image" value="">
            </div>
            <div class="modal-buttons">
                <button onclick="closeModal()" class="btn-cancel">취소</button>
                <button onclick="submitPost()" class="btn-primary">올리기</button>
            </div>
        </div>
    </div>

    <!-- Video Modal -->
    <div id="video-modal" class="modal-overlay" style="display: none;">
        <div class="glass modal-box">
            <h2>영상 추가</h2>
            <div class="input-group">
                <input type="text" id="video-title-input" placeholder="영상 제목">
                <input type="text" id="video-date-input" placeholder="날짜 (예: 2024-04-27)">
                <input type="text" id="video-url" placeholder="YouTube 주소">
            </div>
            <div class="modal-buttons">
                <button onclick="closeVideoModal()" class="btn-cancel">취소</button>
                <button onclick="submitVideo()" class="btn-primary">추가하기</button>
            </div>
        </div>
    </div>

    <!-- Event Modal -->
    <div id="event-modal" class="modal-overlay" style="display: none;">
        <div class="glass modal-box">
            <h2>일정 추가</h2>
            <div class="input-group">
                <input type="date" id="event-date">
                <input type="text" id="event-desc" placeholder="일정 내용">
            </div>
            <div class="modal-buttons">
                <button onclick="closeEventModal()" class="btn-cancel">취소</button>
                <button onclick="submitEvent()" class="btn-primary">추가하기</button>
            </div>
        </div>
    </div>

    <script src="script.js?v=6"></script>
</body>

</html>
